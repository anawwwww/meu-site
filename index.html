<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos Senac</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
  
<h1 class="titulo">
  Ofertas do <span class="destaque" id="destaque">mês</span>
</h1>

 
<div class="container">



  <button class="botao" onclick="trocarImage()"> ← </button>

  <div class="retangulo">
    <div style="text-align: center;">
      <img id="cookies" src="imagens/chocolate.png" width="280">
    </div>
  </div>

  <button class="botao" onclick="trocarImage()"> → </button>

</div>

<div id="infoProduto" style="text-align:center; margin-top:20px;">
    <h3 id="nomeProduto">Cookie Chocolate</h3>
    <p id="precoProduto">Preço: R$ 8,00</p>

<button class="btn-pedido" >
  Fazer Pedido
</button>
 
</div>

<!-- MODAL DE PEDIDO -->
<div id="menuPedido" class="overlay">
  <div class="modal">

    <span id="fecharMenu" class="fechar">✖</span>

    <h2>Fazer Pedido</h2>

    <h3>Escolha o produto:</h3>
    <div id="listaProdutos"></div>
    

    

    <!-- FORM AGORA FICA AQUI DENTRO -->

    <form id="formularioPedido">

      <label>Nome:</label>
      <input type="text" id="nome" required>

      <label>Turma:</label>
      <select id="turma" required>
        <option value="">Selecione</option>
        <option value="terceiroAno">Terceiro Ano</option>
        <option value="segundoJogos">Segundo Ano Jogos</option>
        <option value="segundoAdministracao">Segundo Ano Administração</option>
        <option value="primeiroJogos">Primeiro Ano Jogos</option>
        <option value="Jovemaprendiz">Jovem aprendiz</option>
      </select>

      

      <div id="containerQuantidades"></div>

  

      <label>Observações (opcional):</label>
      <textarea id="detalhes"></textarea>

      <label>Forma de Pegamento:</label>
      <select id="formaPegamento" required>
        <option value="">Selecione</option>
        <option value="Dinheiro">Dinheiro</option>
        <option value="pix">Pix</option>
        <option value="Cartao">Cartao</option>
      </select>

      <label>Lugar de Recebimento:</label>
      <select id="lugarRecebimento" required>
        <option value="">Selecione</option>
        <option value=" Entregar na sala">Entregar na Sala</option>
        <option value=" Retirar na cantina">Retirar na Cantina</option>
      </select>

      

      <button type="submit">Confirmar Pedido</button>

    </form>

  </div>
</div>

<div id="resumoOverlay" class="overlay" style="display:none;">
  <div class="modal">

    <h2>Resumo do Pedido</h2>

    <div id="resumoConteudo"></div>

    <div style="margin-top:20px;">
      <button type="button" id="cancelarResumo">Cancelar</button>
      <button type="button" id="confirmarResumo">Confirmar Pedido</button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>
(function(){
   emailjs.init("O-Adg0g54k63qZHhV");
})();
</script>
<footer class="rodape">
    Vendas terceirão
</footer>
<script src="script.js"></script>
</body>
</html>
